    <script>
        tailwind.config = {
            theme: {

                    fontFamily: { sans: ['Outfit', 'sans-serif'] },

                        brand: {

                            light: '#1e293b',
                            accent: '#3b82f6',
                            glow: '#60a5fa',
                            success: '#10b981',
                            danger: '#ef4444'

    <style>

            background: rgba(30, 41, 59, 0.7);

            <div class="flex items-center justify-between h-20">
                <a href="index.html" class="flex items-center gap-2 group">
                    <i
                        class="fa-brands fa-bitcoin text-3xl text-brand-accent group-hover:rotate-12 transition-transform"></i>
                    <span class="font-bold text-2xl tracking-tight">Crypto<span
                            class="text-brand-accent">Prime</span></span>
                </a>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="index.html"
                            class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Home</a>
                        <a href="market.html"
                            class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Market</a>
                        <a href="features.html"
                            class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Features</a>
                        <a href="contact.html"
                            class="text-brand-accent bg-brand-accent/10 px-3 py-2 rounded-md text-sm font-medium transition-colors border border-brand-accent/20">Contact</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contact Section -->
    <div class="min-h-screen py-20 flex items-center justify-center px-4 relative overflow-hidden">
        <!-- Background Orbs -->
        <div class="absolute top-0 right-0 -mr-32 -mt-32 w-96 h-96 rounded-full bg-brand-accent/10 blur-3xl -z-10">
        </div>
        <div class="absolute bottom-0 left-0 -ml-32 -mb-32 w-96 h-96 rounded-full bg-purple-500/10 blur-3xl -z-10">
        </div>

        <div
            class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-12 glass rounded-3xl p-8 md:p-12 border border-white/5 shadow-2xl">
            <!-- Contact Info -->
            <div class="flex flex-col justify-between">
                <div>
                    <h2 class="text-3xl font-bold text-white mb-6">Get in Touch</h2>
                    <p class="text-gray-400 mb-8">Have questions about our platform or need support? Our team is here to
                        help you 24/7.</p>

                    <div class="space-y-6">
                        <div class="flex items-center gap-4 group">
                            <div
                                class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center text-brand-accent group-hover:bg-brand-accent group-hover:text-white transition-colors">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400">Email Us</p>
                                <p class="font-medium text-white">rumeshchanaka777@gmail.com</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-4 group">
                            <div
                                class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center text-green-500 group-hover:bg-green-500 group-hover:text-white transition-colors">
                                <i class="fas fa-phone"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400">Call Us</p>
                                <p class="font-medium text-white">+94 788779479</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-4 group">
                            <div
                                class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center text-purple-500 group-hover:bg-purple-500 group-hover:text-white transition-colors">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400">Visit Us</p>
                                <p class="font-medium text-white">no 33 1st lane welisarawatta mahabage ragama</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-12 flex gap-4">
                    <a href="#"
                        class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white hover:bg-brand-accent transition-all"><i
                            class="fab fa-twitter"></i></a>
                    <a href="#"
                        class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white hover:bg-blue-600 transition-all"><i
                            class="fab fa-facebook-f"></i></a>
                    <a href="#"
                        class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white hover:bg-pink-600 transition-all"><i
                            class="fab fa-instagram"></i></a>
                </div>
            </div>

            <!-- Contact Form -->
            <form action="https://formspree.io/f/https://formspree.io/f/xeelekrb" method="POST" class="space-y-4"></form>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-400">First Name</label>
                        <input type="text" name="first_name" required
class="w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3"
placeholder="John">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-400">Last Name</label>
                        <input type="text" name="last_name" required
class="w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3"
placeholder="Doe">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-400">Email Address</label>
                    <input type="email" name="email" required
class="w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3"
placeholder="john@example.com">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-400">Message</label>
                    <textarea rows="4" name="message" required
class="w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3"
placeholder="How can we help you?"></textarea>
                </div>

                <button type="submit" class="btn-primary">
  Send Message
<button type="submit" class="bg-blue-500 text-white px-6 py-3 rounded-xl">
  Send Message
</button>
            </form>
        </div>
